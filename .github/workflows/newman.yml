name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock server and run Newman contract tests
        run: |
          npx prism mock contracts/iot-ingestion.openapi.yaml -p 4010 --host 0.0.0.0 > prism-iot.log 2>&1 &
          PRISM_PID=$!
          npx wait-on http://127.0.0.1:4010/health --timeout 120000
          npm run test:mock
          kill "$PRISM_PID" || true

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
